{% extends 'base.html' %}
{% block title %}#{{ tag.name }}{% endblock %}
{% block content %}
<h1>Posts tagged #{{ tag.name }}</h1>
{% for post in posts %}
  <article class="post-card">
    <h2><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h2>
    <p>{{ post.content|truncatewords:40 }}</p>
  </article>
{% empty %}
  <p>No posts with this tag yet.</p>
{% endfor %}
{% endblock %}
