{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}Django Blog{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  <header>
    <nav>
      <a href="{% url 'post_list' %}">Home</a>
      {% if user.is_authenticated %}
        <a href="{% url 'post_create' %}">New Post</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'logout' %}?next={% url 'post_list' %}">Logout</a>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
      {% endif %}
      <form action="{% url 'search' %}" method="get" style="display:inline;">
        <input name="q" placeholder="Search posts..." />
      </form>
    </nav>
    {% if messages %}
      <ul class="messages">{% for m in messages %}<li>{{ m }}</li>{% endfor %}</ul>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
